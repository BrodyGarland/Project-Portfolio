<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brody Garland — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('images/orangechicken.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 8, 5, 0.68);
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c87941;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 900;
      color: #f5ede0;
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin-bottom: 1.25rem;
    }

    p {
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      color: #a89070;
      max-width: 340px;
      margin: 0 auto;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div class="label">Brody Garland — Portfolio</div>
    <h1>Adding<br>Experiences.</h1>
    <p>Check back soon — new projects and updates are on the way.</p>
  </div>
</body>
</html>
